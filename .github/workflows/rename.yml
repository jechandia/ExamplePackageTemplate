name: Rename Package

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  rename:
    name: Rename 'Example' to repository name
    runs-on: ubuntu-latest
    # Skip if this IS the template repo or if already renamed
    if: github.event.repository.name != 'ExamplePackageTemplate'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if rename is needed
        id: check
        run: |
          if [ -d "ExamplePackageTemplate" ]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Rename package
        if: steps.check.outputs.needed == 'true'
        env:
          NEW_NAME: ${{ github.event.repository.name }}
        run: |
          chmod +x .github/scripts/rename.sh
          .github/scripts/rename.sh "$NEW_NAME"

      - name: Remove setup workflow
        if: steps.check.outputs.needed == 'true'
        run: rm -rf .github

      - name: Commit and push
        if: steps.check.outputs.needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: rename package to ${{ github.event.repository.name }}"
          git push
